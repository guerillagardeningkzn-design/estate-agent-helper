<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Estate Agent Helper - Complete property & lead management" />
    <title>Estate Agent Helper</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Brand Colors (customizable) -->
    <style>
      :root {
        /* Default MD Works inspired: dark, professional */
        --color-brand-50: #f9f7f4;
        --color-brand-100: #f0ebe4;
        --color-brand-500: #8b7c6e;
        --color-brand-600: #6b5d51;
        --color-brand-700: #4a3f38;
        --color-brand-900: #2a2218;
        
        /* Text colors */
        --color-text: #2a2218;
        --color-text-light: #78716b;
        --color-text-lighter: #a8a29e;
        --color-text-strong: #1c1917;
        --color-bg: #fafaf9;
        --color-bg-secondary: #f5f5f4;
        --color-border: #e7e5e4;
        
        /* Status colors */
        --color-success: #059669;
        --color-warning: #d97706;
        --color-error: #dc2626;
        --color-info: #0284c7;
      }
      
      /* Light mode by default */
      html {
        color-scheme: light;
      }
      
      body {
        background-color: var(--color-bg);
        color: var(--color-text);
      }
      
      /* Accent color utility */
      .accent { color: var(--color-brand-600); }
      .accent-bg { background-color: var(--color-brand-50); }
      .accent-border { border-color: var(--color-brand-200); }
      
      /* Symbol ✦ styling */
      .symbol {
        font-size: 1.2em;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: var(--color-brand-600);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
